<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zaakceptowane — my-library</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <nav class="topnav">
      <a href="./index.html">Biblioteka</a>
      <a href="./reading-plan.html">Plan czytelniczy</a>
      <a href="./accepted.html" class="active">Zaakceptowane</a>
      <a href="./rejected.html">Odrzucone</a>
    </nav>
    <h1>Zaakceptowane</h1>
    <p class="stats" id="stats">Loading…</p>
  </header>

  <main>
    <table id="entries">
      <thead><tr></tr></thead>
      <tbody></tbody>
    </table>
  </main>

  <script>
  const SOURCE_LABEL = {
    library: "z biblioteki",
    announcement: "zapowiedź",
    market: "rynek",
  };

  // Status derived from current library state (books.json _lib join).
  // Truth signal is shelves — read_date is bonus, not authoritative.
  const computeStatus = (lib) => {
    if (!lib) return { key: "external", label: "📅 zewnętrzne" };
    const shelves = lib.shelves || [];
    const owned = shelves.includes("Posiadane");
    const read = shelves.includes("Przeczytane");
    if (owned && read) return { key: "read", label: "🟢 przeczytane" };
    if (owned) return { key: "bought", label: "🟡 kupione" };
    return { key: "wanted", label: "🛒 chcę kupić" };
  };

  window.LIST_CONFIG = {
    file: "./accepted.json",
    joinLibrary: true,
    emptyMessage: "Pusto. Zaakceptowane rekomendacje z zapowiedzi / rynku wpadną tutaj.",
    summary: (entries) => {
      const counts = { read: 0, bought: 0, wanted: 0, external: 0 };
      for (const e of entries) counts[computeStatus(e._lib).key]++;
      const parts = [];
      if (counts.read)     parts.push(`🟢 ${counts.read} przeczytane`);
      if (counts.bought)   parts.push(`🟡 ${counts.bought} kupione`);
      if (counts.wanted)   parts.push(`🛒 ${counts.wanted} chcę kupić`);
      if (counts.external) parts.push(`📅 ${counts.external} zewn.`);
      return parts.join(" · ");
    },
    columns: [
      {
        label: "Okładka",
        cls: "cover",
        render: (e, { escape }) => {
          return e.cover_url ? `<img src="${escape(e.cover_url)}" alt="" loading="lazy">` : "";
        },
      },
      {
        label: "Tytuł",
        cls: "title",
        render: (e, { escape }) => {
          if (e.url) {
            return `<a href="${escape(e.url)}" target="_blank" rel="noopener">${escape(e.title || "")}</a>`;
          }
          return escape(e.title || "");
        },
      },
      {
        label: "Autor",
        render: (e, { escape }) => escape(e.author || ""),
      },
      {
        label: "Status",
        render: (e, { escape }) => {
          const s = computeStatus(e._lib);
          return `<span class="status-pill status-${s.key}">${escape(s.label)}</span>`;
        },
      },
      {
        label: "Skąd",
        render: (e, { escape }) => escape(SOURCE_LABEL[e.source] || e.source || "—"),
      },
      {
        label: "Dodano",
        cls: "num",
        render: (e, { fmtDate }) => fmtDate(e.when),
      },
      {
        label: "Notatka",
        cls: "note",
        render: (e, { escape }) => (e.note ? escape(e.note) : `<span class="dash">—</span>`),
      },
    ],
  };
  </script>
  <script src="./list-view.js" defer></script>
</body>
</html>
