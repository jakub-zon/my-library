name: Update library

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-library
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit and push if changed
        run: |
          changed=""
          if ! git diff --quiet docs/books.json; then
            changed="$changed docs/books.json"
          fi
          if ! git diff --quiet -- docs/books-details.json 2>/dev/null || [ -n "$(git status --porcelain docs/books-details.json)" ]; then
            changed="$changed docs/books-details.json"
          fi
          if [ -z "$changed" ]; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/books.json docs/books-details.json
          git commit -m "Update library data via manual workflow run"
          git push
