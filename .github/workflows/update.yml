name: Update library

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-library
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/books.json docs/books-details.json docs/meta.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "Update library data via manual workflow run"
          # Rebase in case commits landed on main while the job was running
          # (e.g. the library-advisor skill pushing state files). Retry.
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push failed on attempt $attempt, retrying after 5s…"
            sleep 5
          done
          echo "Giving up on push after 3 attempts."
          exit 1
